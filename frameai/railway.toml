[build]
builder = "NIXPACKS"
buildCommand = "npm install && npx prisma generate && cd client && rm -rf node_modules/.cache && npm install && npm run build"

[deploy]
startCommand = "npx prisma db push && node server/seed.js && node server/index.js"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
